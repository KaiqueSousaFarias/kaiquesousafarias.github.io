<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Cards Shop</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Gift Cards Shop</h1>
            <nav>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Produtos</a></li>
                    <li><a href="#">Carrinho</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="content">
        <section class="hero">
            <div class="container">
                <h2>Encontre o gift card perfeito para você!</h2>
                <p>Descubra uma variedade de opções de gift cards de suas lojas favoritas.</p>
            </div>
        </section>

        <section class="products">
            <div class="container">
                <h2>Nossos Produtos</h2>
                <div class="product-list">
                    <!-- Aqui vão os produtos -->
                    <div class="products">
                    </div>
                    <!-- Produtos serão inseridos dinamicamente aqui -->
                </div>
            </div>
        </section>

        <section class="cart">
            <div class="container">
                <h2>Carrinho</h2>
                <ul id="cart-items">
                    <!-- Itens do carrinho serão adicionados dinamicamente aqui -->
                </ul>
                <div class="cart-total">
                    <!-- <h3>Total: R$ <span id="cart-total">0,00</span></h3> -->
                    <button class="checkout" onclick="checkout()">Finalizar Compra</button>
                </div>
            </div>
        </section>
    </div>
    
    <footer>
        <div class="container">
            <p>Copyright &copy; <script>document.write(new Date().getFullYear());</script> Gift Cards Shop. Todos os direitos reservados.</p>
            <p>Desenvolvido por <a href="https://www.linkedin.com/in/kaique-sousa-farias/" target="_blank">Kaique Sousa.</a></p>
        </div>
    </footer>
    <script src="js/scripts.js"></script>
</body>
</html>
